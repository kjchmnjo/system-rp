<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime RP | System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --dark-bg: #050505; --card-bg: rgba(15, 15, 15, 0.95); }
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: var(--dark-bg); color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .main-card, .dashboard-card { background: var(--card-bg); padding: 40px; border-radius: 30px; border: 1px solid rgba(212, 175, 55, 0.3); text-align: center; width: 350px; display: none; }
        h1 { font-size: 2.5rem; margin-bottom: 20px; font-weight: 900; }
        h1 span { color: var(--gold); }
        .nav-buttons { display: flex; flex-direction: column; gap: 10px; }
        input { padding: 15px; border-radius: 10px; border: 1px solid #333; background: #000; color: #fff; outline: none; }
        input:focus { border-color: var(--gold); }
        .btn { padding: 15px; border-radius: 10px; font-weight: 700; cursor: pointer; border: none; text-transform: uppercase; }
        .btn-prime { background: var(--gold); color: #000; }
        .btn-outline { background: transparent; color: var(--gold); border: 1px solid var(--gold); }
        .btn-logout { background: #ff4444; color: #fff; margin-top: 20px; width: 100%; }
    </style>
</head>
<body>

    <div id="guest-view" class="main-card" style="display: block;">
        <h1>PRIME <span>RP</span></h1>
        <div class="nav-buttons">
            <input type="text" id="auth-login" placeholder="Twój Login (Nick)">
            <input type="password" id="auth-password" placeholder="Hasło">
            
            <button id="login-btn" class="btn btn-prime">Zaloguj się</button>
            <button id="register-btn" class="btn btn-outline">Stwórz konto</button>
        </div>
    </div>

    <div id="user-view" class="dashboard-card">
        <h1>Witaj, <span id="display-nick">Obywatelu</span></h1>
        <p>Jesteś zalogowany do systemu Prime RP.</p>
        <button id="logout-btn" class="btn btn-logout">Wyloguj</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
