<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime RP | Edycja 2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #d4af37;
            --gold-bright: #f9d976;
            --dark-bg: #050505;
            --card-bg: rgba(15, 15, 15, 0.9);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--dark-bg);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .bg-animate {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at top right, #1a1505, transparent),
                        radial-gradient(circle at bottom left, #0a0a0a, transparent);
            z-index: -1;
        }

        .main-card {
            background: var(--card-bg);
            padding: 50px;
            border-radius: 30px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            text-align: center;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 60px rgba(0, 0, 0, 1), 0 0 20px rgba(212, 175, 55, 0.05);
            max-width: 500px;
            width: 90%;
            animation: fadeIn 1.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .edition-badge {
            background: linear-gradient(90deg, var(--gold), var(--gold-bright));
            color: #000;
            padding: 6px 25px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 0.75rem;
            letter-spacing: 2px;
            display: inline-block;
            margin-bottom: 20px;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }

        h1 {
            font-size: 3.5rem;
            margin: 0;
            font-weight: 900;
            letter-spacing: -2px;
            background: linear-gradient(to bottom, #ffffff 30%, #a0a0a0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h1 span {
            color: var(--gold);
            -webkit-text-fill-color: var(--gold);
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
        }

        .description {
            color: #ccc;
            margin: 25px 0 45px 0;
            font-size: 1.05rem;
            line-height: 1.7;
            font-weight: 300;
        }

        .nav-buttons {
            display: grid;
            gap: 18px;
        }

        .btn {
            padding: 16px 35px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 700;
            text-transform: uppercase;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            letter-spacing: 1px;
        }

        .btn-discord {
            background: #5865F2;
            color: white;
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.3);
        }

        .btn-discord:hover {
            background: #4752c4;
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(88, 101, 242, 0.5);
        }

        .btn-prime {
            background: rgba(212, 175, 55, 0.05);
            color: var(--gold);
            border: 2px solid var(--gold);
        }

        .btn-prime:hover {
            background: var(--gold);
            color: black;
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
        }

        .server-status {
            margin-top: 40px;
            font-size: 0.85rem;
            color: #666;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 25px;
        }

        .dot {
            width: 10px;
            height: 100px; /* Placeholder for visual line */
            width: 10px;
            height: 10px;
            background: #ffaa00;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 170, 0, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 170, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 170, 0, 0); }
        }
    </style>
</head>
<body>

    <div class="bg-animate"></div>

    <div class="main-card">
        <div class="edition-badge">Edycja 2</div>
        <h1>PRIME <span>RP</span></h1>
        <p class="description">
            Wracamy z nową energią. Odkryj najwyższy standard RolePlay, gdzie Twoja kreatywność kształtuje rzeczywistość. Prime RP Edycja 2 to zupełnie nowy poziom rozgrywki.
        </p>

        <div class="nav-buttons">
            <a href="https://discord.gg/MecNqskCTu" target="_blank" class="btn btn-discord">
                <i class="fab fa-discord"></i> Dołącz na Discord
            </a>
            
            <a href="#" class="btn btn-prime">
                <i class="fas fa-shopping-cart"></i> Sklep Serwera
            </a>
            
            <a href="#" class="btn btn-prime">
                <i class="fas fa-book"></i> Regulamin
            </a>
        </div>

        <div class="server-status">
            <div class="dot"></div> 
            <span>STATUS: <strong>PRACE KONFIGURACYJNE</strong></span>
        </div>
    </div>

</body>
</html>
