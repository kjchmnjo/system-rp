<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime RP | System Zarządzania</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #d4af37;
            --gold-bright: #f9d976;
            --dark-bg: #050505;
            --card-bg: rgba(15, 15, 15, 0.95);
            --discord: #5865F2;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--dark-bg);
            color: #fff;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden;
        }

        .bg-animate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at top right, #1a1505, transparent),
                        radial-gradient(circle at bottom left, #0a0a0a, transparent);
            z-index: -1;
        }

        .main-card, .dashboard-card {
            background: var(--card-bg);
            padding: 40px 50px;
            border-radius: 30px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            text-align: center;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 60px rgba(0, 0, 0, 1);
            max-width: 450px; width: 90%;
            display: none; /* Sterowane przez JS */
        }

        h1 { font-size: 3rem; margin: 0; font-weight: 900; letter-spacing: -2px; }
        h1 span { color: var(--gold); }

        .nav-buttons { display: flex; flex-direction: column; gap: 12px; margin-top: 25px; }

        input {
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            background: rgba(0, 0, 0, 0.6);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); }

        .btn {
            padding: 16px; border-radius: 12px;
            text-decoration: none; font-weight: 700;
            text-transform: uppercase; transition: 0.3s ease;
            display: flex; align-items: center; justify-content: center;
            gap: 10px; font-size: 0.85rem; cursor: pointer; border: none; width: 100%;
            box-sizing: border-box;
        }

        .btn-prime { background: var(--gold); color: black; }
        .btn-prime:hover { background: var(--gold-bright); transform: translateY(-2px); }

        .btn-outline { background: transparent; color: var(--gold); border: 2px solid var(--gold); }
        .btn-outline:hover { background: rgba(212, 175, 55, 0.1); }

        .btn-discord { background: var(--discord); color: white; margin-top: 5px; }
        .btn-logout { background: #ff4444; color: white; margin-top: 20px; }

        /* Panel Po Zalogowaniu */
        .user-info { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; text-align: left; border-bottom: 1px solid #333; padding-bottom: 20px; }
        .avatar { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--gold); background: #222; }
        .status-badge { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; border-left: 4px solid var(--gold); text-align: left; font-size: 0.9rem; line-height: 1.5; }
    </style>
</head>
<body>

    <div class="bg-animate"></div>

    <div id="guest-view" class="main-card" style="display: block;">
        <h1>PRIME <span>RP</span></h1>
        <p style="color: #888; margin: 10px 0 20px 0;">Witaj Obywatelu, zaloguj się.</p>
        
        <div class="nav-buttons">
            <input type="email" id="auth-email" placeholder="Adres E-mail">
            <input type="password" id="auth-password" placeholder="Hasło">
            
            <button id="login-btn" class="btn btn-prime">Zaloguj się</button>
            <button id="register-btn" class="btn btn-outline">Stwórz konto</button>

            <div style="margin: 10px 0; color: #444; font-size: 0.7rem; font-weight: bold;">LUB PRZEZ</div>

            <button id="discord-login-btn" class="btn btn-discord">
                <i class="fab fa-discord"></i> Discord Login
            </button>
            
            <a href="https://discord.gg/MecNqskCTu" target="_blank" style="color: var(--gold); text-decoration: none; font-size: 0.8rem; margin-top: 10px;">
                Powrót do społeczności
            </a>
        </div>
    </div>

    <div id="user-view" class="dashboard-card">
        <div class="user-info">
            <img id="user-avatar" class="avatar" src="https://ui-avatars.com/api/?name=O&background=d4af37&color=fff" alt="">
            <div>
                <div style="font-size: 0.75rem; color: #888; text-transform: uppercase;">Zalogowany jako:</div>
                <div id="user-name" style="font-weight: 900; font-size: 1.1rem; color: #fff;">...</div>
            </div>
        </div>
        
        <div class="status-badge">
            <b style="color: var(--gold);">Status Systemu:</b> Aktywny<br>
            Witaj w czystym oknie panelu Prime RP. Twoje konto zostało pomyślnie zweryfikowane.
        </div>

        <div class="nav-buttons">
            <button onclick="alert('System postaci wkrótce!')" class="btn btn-outline">Moje Postacie</button>
            <button id="logout-btn" class="btn btn-logout">Wyloguj się</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
