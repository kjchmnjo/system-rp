<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wirtualny System RP | Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loader" class="loader-wrapper">
        <div class="spinner"></div>
    </div>

    <main id="auth-section" class="full-screen">
        <div class="auth-card">
            <div class="auth-header">
                <h1>WIRTUALNY<span>SYSTEM</span></h1>
                <p>System Zarządzania Obywatelem</p>
            </div>
            <div class="auth-form">
                <div class="input-field">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="Email (np. gracz@wsrp.pl)">
                </div>
                <div class="input-field">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Hasło">
                </div>
                <button id="login-btn" class="btn-primary">ZALOGUJ SIĘ</button>
                <div class="auth-footer">
                    <a href="https://discord.gg/TWOJ-LINK" target="_blank"><i class="fab fa-discord"></i> Pomoc na Discordzie</a>
                </div>
            </div>
        </div>
    </main>

    <main id="dashboard-section" class="dashboard-layout" style="display: none;">
        <aside class="sidebar">
            <div class="sidebar-logo">WS<span>RP</span></div>
            <nav>
                <div class="nav-item active"><i class="fas fa-home"></i> Pulpit</div>
                <div class="nav-item"><i class="fas fa-id-card"></i> Moja Postać</div>
                <div class="nav-item"><i class="fas fa-book"></i> Regulamin</div>
            </nav>
            <div class="sidebar-footer">
                <span id="user-email">użytkownik</span>
                <button id="logout-btn" class="btn-logout"><i class="fas fa-power-off"></i></button>
            </div>
        </aside>

        <section class="main-content">
            <header class="top-bar">
                <h2>Panel Obywatela</h2>
                <div class="server-status"><span class="dot"></span> Serwer Online</div>
            </header>

            <div class="grid-container">
                <a href="fivem://connect/TWOJE_IP" class="stat-card action">
                    <i class="fas fa-play"></i>
                    <div class="info">
                        <h3>Graj teraz</h3>
                        <p>Połącz z serwerem</p>
                    </div>
                </a>
                <div class="stat-card">
                    <i class="fas fa-wallet"></i>
                    <div class="info">
                        <h3>Portfel</h3>
                        <p>$0.00</p>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-clock"></i>
                    <div class="info">
                        <h3>Czas gry</h3>
                        <p>0h</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
