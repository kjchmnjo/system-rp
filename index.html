<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wirtualny System RP | Oficjalna Strona</title>
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --bg: #0a0b10;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animowane tło */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1b26 0%, #0a0b10 100%);
            z-index: -1;
        }

        .container {
            text-align: center;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .status-tag {
            display: inline-block;
            padding: 5px 15px;
            background: rgba(0, 242, 255, 0.1);
            border: 1px solid var(--primary);
            color: var(--primary);
            border-radius: 50px;
            font-size: 0.8rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            font-weight: bold;
        }

        p {
            line-height: 1.6;
            color: #a0a0b0;
            margin-bottom: 30px;
        }

        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 4px 15px rgba(0, 242, 255, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 242, 255, 0.5);
        }

        .btn-outline {
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: white;
        }

        .footer {
            margin-top: 40px;
            font-size: 0.7rem;
            color: #505060;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="status-tag">System: Prace techniczne</div>
        <h1>Wirtualny System RP</h1>
        <p>Witaj w sercu nowej generacji RolePlay. Tworzymy unikalne doświadczenie, w którym Twoja historia nie ma granic. Nasze systemy są obecnie optymalizowane.</p>
        
        <div class="buttons">
            <a href="https://discord.gg/TWÓJ-KOD" class="btn btn-primary">Dołącz na Discord</a>
            <a href="#store" class="btn btn-outline">Sklep Serwera</a>
        </div>

        <div class="footer">
            &copy; 2026 WIRTUALNYSYSTEMRP.PL - ALL RIGHTS RESERVED
        </div>
    </div>

</body>
</html>
