<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wirtualny System RP | Panel Obywatela</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-overlay"></div>

    <section id="hero-section" class="active">
        <div class="container">
            <header class="header-main">
                <h1>WIRTUALNY<span>SYSTEM</span></h1>
                <p>Wybierz kierunek swojej przygody</p>
            </header>

            <div class="button-grid">
                <a href="https://discord.gg/TWOJ-LINK" target="_blank" class="card discord">
                    <i class="fab fa-discord"></i>
                    <h3>DISCORD</h3>
                    <p>Społeczność i pomoc</p>
                </a>

                <a href="#" class="card rules">
                    <i class="fas fa-file-signature"></i>
                    <h3>REGULAMIN</h3>
                    <p>Zasady panujące na wyspie</p>
                </a>

                <div id="trigger-login" class="card login">
                    <i class="fas fa-user-shield"></i>
                    <h3>LOGIN</h3>
                    <p>Dostęp do systemu RP</p>
                </div>
            </div>
        </div>
    </section>

    <section id="auth-section">
        <div class="auth-card">
            <button id="back-to-hero" class="btn-back"><i class="fas fa-arrow-left"></i> Powrót</button>
            <h2>AUTORYZACJA</h2>
            <div class="input-group">
                <input type="email" id="email" placeholder="Email gracza">
                <input type="password" id="password" placeholder="Hasło">
            </div>
            <button id="login-execute" class="btn-gold">ZALOGUJ</button>
        </div>
    </section>

    <section id="dashboard-section">
        <div class="dashboard-content">
            <h1>Witaj w systemie, <span id="user-name">Graczu</span>!</h1>
            <p>Twój panel jest gotowy.</p>
            <button id="logout-btn" class="btn-logout">Wyloguj się</button>
        </div>
    </section>

    <script type="module" src="app.js"></script>
</body>
</html>
