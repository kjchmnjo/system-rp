<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime RP | System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Zachowujemy Twój złoty styl Prime RP */
        :root { --gold: #d4af37; --dark-bg: #050505; --card-bg: rgba(15, 15, 15, 0.95); --discord: #5865F2; }
        body { margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; background-color: var(--dark-bg); color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        .bg-animate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at top right, #1a1505, transparent), radial-gradient(circle at bottom left, #0a0a0a, transparent); z-index: -1; }
        .main-card, .dashboard-card { background: var(--card-bg); padding: 40px 50px; border-radius: 30px; border: 1px solid rgba(212, 175, 55, 0.3); text-align: center; backdrop-filter: blur(20px); box-shadow: 0 0 60px rgba(0, 0, 0, 1); max-width: 500px; width: 90%; display: none; }
        h1 { font-size: 3rem; margin: 0; font-weight: 900; letter-spacing: -2px; }
        h1 span { color: var(--gold); }
        .nav-buttons { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; }
        .btn { padding: 16px 30px; border-radius: 12px; text-decoration: none; font-weight: 700; text-transform: uppercase; transition: 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 12px; font-size: 0.9rem; cursor: pointer; border: none; width: 100%; box-sizing: border-box; }
        .btn-login { background: var(--discord); color: white; }
        .btn-prime { background: rgba(212, 175, 55, 0.05); color: var(--gold); border: 2px solid var(--gold); }
        .btn-logout { background: #ff4444; color: white; margin-top: 20px; }
        .user-info { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 25px; text-align: left; }
        .avatar { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--gold); }
        .status-badge { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 15px; border-left: 4px solid var(--gold); text-align: left; }
    </style>
</head>
<body>
    <div class="bg-animate"></div>

    <div id="guest-view" class="main-card" style="display: block;">
        <h1>PRIME <span>RP</span></h1>
        <div class="nav-buttons">
            <button id="login-btn" class="btn btn-login"><i class="fab fa-discord"></i> Zaloguj przez Discord</button>
            <a href="https://discord.gg/MecNqskCTu" target="_blank" class="btn btn-prime"><i class="fas fa-users"></i> Społeczność Discord</a>
            <a href="#" class="btn btn-prime" style="opacity: 0.5;">Sklep Serwera</a>
            <a href="#" class="btn btn-prime" style="opacity: 0.5;">Regulamin Wyspy</a>
        </div>
    </div>

    <div id="user-view" class="dashboard-card">
        <div class="user-info">
            <img id="user-avatar" class="avatar" src="" alt="">
            <div>
                <div style="font-size: 0.8rem; color: #888;">Witaj z powrotem,</div>
                <div id="user-name" style="font-weight: 900; font-size: 1.4rem; color: #fff;">Obywatelu</div>
            </div>
        </div>
        <div class="status-badge">System Prime RP Edycja 2. Twój panel jest gotowy.</div>
        <button id="logout-btn" class="btn btn-logout">Wyloguj się</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
