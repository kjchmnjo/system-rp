<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrimeRP | Panel Gracza - Zgłoś Błąd</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Saira+Stencil+One&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Kolory przewodnie z Twojego zdjęcia */
            --bg-body: #0a0a0b;         /* Bardzo ciemne tło */
            --bg-sidebar: #050505;      /* Jeszcze ciemniejszy sidebar */
            --bg-card: #151518;         /* Tło karty zgłoszenia */
            --bg-button: #242426;       /* Tło nieaktywnych przycisków */
            --bg-button-hover: #3a3a3d;  /* Tło przycisku przy najechaniu */
            --text-main: #ffffff;        /* Biały tekst */
            --text-sub: #a0a0a5;         /* Szary tekst podtytułów */
            --logo-accent: #fcd535;      /* Neonowy żółty logo */
            --discord-accent: #5865F2;   /* Fioletowy akcent przycisku */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 280px;
            background-color: var(--bg-sidebar);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #1a1a1c;
            flex-shrink: 0; /* Sidebar nie zmniejsza się */
        }

        .logo-container {
            text-align: center;
            margin-bottom: 60px;
        }

        /* Emulacja logo za pomocą fontu */
        .logo-text {
            font-family: 'Saira Stencil One', cursive;
            font-size: 1.6rem;
            color: var(--logo-accent);
            text-shadow: 0 0 10px rgba(252, 213, 53, 0.5);
            line-height: 1.1;
        }

        .logo-text span {
            color: var(--text-main);
        }

        .nav-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            background-color: var(--bg-button);
            padding: 18px 25px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 600;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .nav-item:hover {
            background-color: var(--bg-button-hover);
            transform: translateX(5px);
        }

        .nav-item.active {
            border-color: var(--text-main); /* Obramowanie dla aktywnego */
        }

        /* Emulacja ikon (możesz później podmienić na SVG) */
        .nav-item::before {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            margin-right: 15px;
            background-size: contain;
            background-repeat: no-repeat;
            opacity: 0.8;
        }

        /* Przykładowe emoji jako ikony (tymczasowe rozwiązanie) */
        .icon-news::before { content: '📰'; }
        .icon-about::before { content: '👥'; }
        .icon-map::before { content: '🗺️'; }
        .icon-bug::before { content: '🐛'; }
        .icon-rules::before { content: '📜'; }


        /* --- MAIN CONTENT --- */
        .main-content {
            flex-grow: 1;
            padding: 60px 80px;
        }

        .welcome-header {
            font-size: 2.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 60px;
        }

        .report-card {
            background-color: var(--bg-card);
            border-radius: 20px;
            padding: 50px;
            border: 1px solid #1a1a1c;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }

        .report-title {
            font-size: 2rem;
            font-weight: 800;
            color: var(--logo-accent);
            text-shadow: 0 0 10px rgba(252, 213, 53, 0.3);
            margin-bottom: 25px;
        }

        .report-description {
            color: var(--text-sub);
            font-size: 1.1rem;
            line-height: 1.7;
            margin-bottom: 40px;
            max-width: 600px;
        }

        .ticket-button {
            display: inline-block;
            background-color: var(--discord-accent);
            color: var(--text-main);
            padding: 20px 60px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(88, 101, 242, 0.4);
            cursor: pointer;
            border: none;
        }

        .ticket-button:hover {
            transform: translateY(-5px) scale(1.02);
            filter: brightness(1.15);
        }

        /* Responsywność */
        @media (max-width: 1024px) {
            .sidebar { width: 240px; }
            .main-content { padding: 40px; }
            .welcome-header { font-size: 2rem; }
            .report-card { padding: 30px; }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="logo-container">
            <div class="logo-text">
                PRIME<br>
                <span>RP</span>
            </div>
        </div>
        
        <ul class="nav-list">
            <li><a href="#" class="nav-item icon-news">Nowości</a></li>
            <li><a href="#" class="nav-item icon-about">O nas</a></li>
            <li><a href="#" class="nav-item icon-map">Mapa</a></li>
            <li><a href="#" class="nav-item icon-bug active">Zgłoś Błąd</a></li>
            <li><a href="#" class="nav-item icon-rules">Regulamin</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <h1 class="welcome-header">WITAJ, Jakub Peno</h1>

        <div class="report-card">
            <h2 class="report-title">Zgłoś Błąd</h2>
            <p class="report-description">
                Twój feedback pomaga nam ulepszać wyspę. Opisz problem dokładnie na naszym kanale Discord.
            </p>
            
            <a href="https://discord.gg/TWÓJ-LINK-TICKET" class="ticket-button">
                OTWÓRZ TICKET
            </a>
        </div>
    </main>

</body>
</html>
