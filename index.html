<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS App - Pełny Kod</title>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 2rem; }
        .card { background: white; padding: 2rem; border-radius: 12px; shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); width: 100%; max-width: 400px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: var(--primary); }
        input { width: 100%; padding: 0.5rem; margin-bottom: 1rem; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; background: var(--primary); color: white; border: none; padding: 0.75rem; border-radius: 6px; cursor: pointer; font-weight: bold; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        ul { list-style: none; padding: 0; margin-top: 1.5rem; }
        li { background: #f1f5f9; padding: 0.75rem; margin-bottom: 0.5rem; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .delete-btn { background: #ef4444; width: auto; padding: 0.25rem 0.5rem; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="card">
    <h2>🚀 JS Core App</h2>
    <input type="text" id="taskInput" placeholder="Co mamy do zrobienia?">
    <button id="addBtn">Dodaj do listy</button>
    <ul id="taskList"></ul>
</div>

<script>
    /**
     * PEŁNA LOGIKA APLIKACJI
     */
    const App = {
        // Stan aplikacji
        state: {
            tasks: JSON.parse(localStorage.getItem('myTasks')) || [],
        },

        // Inicjalizacja
        init() {
            this.cacheDOM();
            this.bindEvents();
            this.render();
        },

        // Pobranie elementów DOM
        cacheDOM() {
            this.input = document.getElementById('taskInput');
            this.button = document.getElementById('addBtn');
            this.list = document.getElementById('taskList');
        },

        // Podpięcie zdarzeń
        bindEvents() {
            this.button.addEventListener('click', () => this.addTask());
            this.input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') this.addTask();
            });
        },

        // Metody logiki
        addTask() {
            const value = this.input.value.trim();
            if (!value) return;

            const newTask = {
                id: crypto.randomUUID(),
                text: value,
                date: new Date().toLocaleTimeString()
            };

            this.state.tasks = [...this.state.tasks, newTask];
            this.saveAndRender();
            this.input.value = '';
        },

        deleteTask(id) {
            this.state.tasks = this.state.tasks.filter(t => t.id !== id);
            this.saveAndRender();
        },

        saveAndRender() {
            localStorage.setItem('myTasks', JSON.stringify(this.state.tasks));
            this.render();
        },

        // Renderowanie interfejsu
        render() {
            this.list.innerHTML = this.state.tasks.map(task => `
                <li>
                    <span>${task.text} <small style="color: #64748b; font-size: 0.7rem;">(${task.date})</small></span>
                    <button class="delete-btn" onclick="App.deleteTask('${task.id}')">X</button>
                </li>
            `).join('');
        }
    };

    // Startujemy!
    App.init();
</script>

</body>
</html>
