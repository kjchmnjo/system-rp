<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wirtualny System RP | Witaj w Mieście</title>
    <style>
        :root {
            --primary: #ff4d4d; /* Kolor przewodni - zmień na swój ulubiony */
            --bg: #0f0f0f;
            --card: #1a1a1a;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 800px;
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 0;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: var(--text);
            text-shadow: 0 0 10px var(--primary), 0 0 20px var(--primary);
        }

        .subtitle {
            font-size: 1.2rem;
            color: #888;
            margin-top: 10px;
            margin-bottom: 40px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #333;
            transition: 0.3s;
        }

        .card:hover {
            border-color: var(--primary);
            transform: scale(1.05);
        }

        .btn {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 15px 40px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(255, 77, 77, 0.3);
            margin: 10px;
        }

        .btn-discord {
            background: #5865F2;
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.3);
        }

        .btn:hover {
            filter: brightness(1.2);
            transform: translateY(-3px);
        }

        .status {
            margin-top: 50px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .dot {
            height: 10px;
            width: 10px;
            background-color: #44ff44;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px #44ff44;
        }

        footer {
            margin-top: 60px;
            color: #444;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>WIRTUALNY SYSTEM RP</h1>
        <p class="subtitle">Prawdziwe życie, wirtualne zasady.</p>

        <div class="grid">
            <div class="card">
                <h3>Whitelist</h3>
                <p>Status: <strong>OTWARTA</strong></p>
            </div>
            <div class="card">
                <h3>Ekonomia</h3>
                <p>Typ: <strong>REALISTYCZNA</strong></p>
            </div>
            <div class="card">
                <h3>Sloty</h3>
                <p>Liczba: <strong>64 / 128</strong></p>
            </div>
        </div>

        <a href="https://discord.gg/TWOJ-LINK" class="btn btn-discord">DOŁĄCZ DO DISCORDA</a>
        <a href="#" class="btn">REGULAMIN</a>

        <div class="status">
            <span class="dot"></span> System domeny aktywny: wirtualnysystemrp.pl
        </div>
    </div>

    <footer>
        &copy; 2026 Wirtualny System RP. Strona hostowana na Cloudflare Pages.
    </footer>

</body>
</html>
