<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime RP | Edycja 2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #d4af37;
            --gold-bright: #f9d976;
            --dark-bg: #050505;
            --card-bg: rgba(15, 15, 15, 0.9);
            --discord: #5865F2;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--dark-bg);
            color: #fff;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden;
        }

        .bg-animate {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at top right, #1a1505, transparent),
                        radial-gradient(circle at bottom left, #0a0a0a, transparent);
            z-index: -1;
        }

        .main-card {
            background: var(--card-bg);
            padding: 40px 50px;
            border-radius: 30px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            text-align: center;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 60px rgba(0, 0, 0, 1);
            max-width: 500px; width: 90%;
            animation: fadeIn 1.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .edition-badge {
            background: linear-gradient(90deg, var(--gold), var(--gold-bright));
            color: #000;
            padding: 6px 25px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 0.75rem;
            letter-spacing: 2px;
            display: inline-block; margin-bottom: 20px;
            text-transform: uppercase;
        }

        h1 {
            font-size: 3.5rem; margin: 0;
            font-weight: 900; letter-spacing: -2px;
            background: linear-gradient(to bottom, #ffffff 30%, #a0a0a0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h1 span { color: var(--gold); -webkit-text-fill-color: var(--gold); }

        .description {
            color: #ccc; margin: 20px 0 35px 0;
            font-size: 1rem; line-height: 1.6;
        }

        .nav-buttons { 
            display: flex;
            flex-direction: column;
            gap: 15px; 
        }

        .btn {
            padding: 16px 30px; 
            border-radius: 12px;
            text-decoration: none; 
            font-weight: 700;
            text-transform: uppercase; 
            transition: all 0.3s ease;
            display: flex; 
            align-items: center; 
            justify-content: center;
            gap: 12px; 
            font-size: 0.9rem; 
            cursor: pointer; 
            border: none;
            width: 100%;
            box-sizing: border-box;
        }

        .btn-login {
            background: var(--discord);
            color: white;
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.2);
        }

        .btn-login:hover {
            background: #4752c4;
            transform: translateY(-2px);
        }

        .btn-prime {
            background: rgba(212, 175, 55, 0.05);
            color: var(--gold);
            border: 2px solid var(--gold);
        }

        .btn-prime:hover {
            background: var(--gold);
            color: black;
            transform: translateY(-2px);
        }

        /* Styl dla nieaktywnych przycisków */
        .btn-disabled {
            cursor: default;
            opacity: 0.8;
        }
        .btn-disabled:hover {
            transform: none;
            box-shadow: none;
        }

        .server-status {
            margin-top: 35px; font-size: 0.8rem;
            color: #666; display: flex;
            align-items: center; justify-content: center; gap: 8px;
        }

        .dot {
            width: 8px; height: 8px;
            background: #ffaa00; border-radius: 50%;
            box-shadow: 0 0 10px #ffaa00;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.7; }
            70% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 15px #ffaa00; }
            100% { transform: scale(0.95); opacity: 0.7; }
        }
    </style>
</head>
<body>

    <div class="bg-animate"></div>

    <div class="main-card">
        <div class="edition-badge">Edycja 2</div>
        <h1>PRIME <span>RP</span></h1>
        <p class="description">
            Wracamy z nową energią. Zaloguj się, aby uzyskać dostęp do panelu obywatela.
        </p>

        <div class="nav-buttons">
            <button onclick="loginWithDiscord()" class="btn btn-login">
                <i class="fab fa-discord"></i> Zaloguj przez Discord
            </button>

            <a href="https://discord.gg/MecNqskCTu" target="_blank" class="btn btn-prime">
                <i class="fas fa-users"></i> Społeczność Discord
            </a>
            
            <a href="#" class="btn btn-prime btn-disabled">
                <i class="fas fa-shopping-cart"></i> Sklep Serwera
            </a>
            
            <a href="#" class="btn btn-prime btn-disabled">
                <i class="fas fa-book"></i> Regulamin Wyspy
            </a>
        </div>

        <div class="server-status">
            <div class="dot"></div> STATUS: PRACE KONFIGURACYJNE
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Tutaj wklej swoje klucze Supabase
        const SUPABASE_URL = 'https://twoja-domena.supabase.co';
        const SUPABASE_ANON_KEY = 'twoj-klucz-anon';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function loginWithDiscord() {
            const { data, error } = await supabase.auth.signInWithOAuth({
                provider: 'discord',
                options: { redirectTo: window.location.origin }
            });
            if (error) console.log(error.message);
        }

        window.onload = async () => {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                const user = session.user.user_metadata;
                document.querySelector('h1').innerHTML = "Witaj, <span>" + (user.full_name || user.custom_claims?.global_name || "Gracz") + "</span>";
                const loginBtn = document.querySelector('.btn-login');
                loginBtn.innerHTML = '<i class="fas fa-sign-out-alt"></i> Wyloguj się';
                loginBtn.setAttribute('onclick', 'logout()');
            }
        };

        async function logout() {
            await supabase.auth.signOut();
            window.location.reload();
        }
    </script>
</body>
</html>
