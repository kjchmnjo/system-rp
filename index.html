<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wirtualny System RP | PrimeRP Sezon 2</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --gold: #FFC800;
            --gold-glow: rgba(255, 200, 0, 0.5);
            --dark-pure: #030303;
            --dark-card: rgba(10, 10, 10, 0.9);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: #999999;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        
        body { 
            font-family: 'Montserrat', sans-serif;
            background: var(--dark-pure); 
            color: var(--text-main); 
            height: 100vh; 
            overflow: hidden; 
        }

        .bg-glow {
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(255, 200, 0, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255, 200, 0, 0.05) 0%, transparent 40%),
                linear-gradient(180deg, #0a0a0a 0%, #000 100%);
            z-index: -1;
        }

        section {
            display: none;
            height: 100vh;
            width: 100%;
            padding: 20px;
            animation: sectionIn 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        section.active { display: flex; }

        @keyframes sectionIn {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* HERO CARD */
        #hero-section { align-items: center; justify-content: center; }
        
        .hero-card {
            background: var(--dark-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            padding: 60px 50px;
            border-radius: 40px;
            width: 100%;
            max-width: 520px;
            text-align: center;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
            position: relative;
            overflow: hidden;
        }

        .hero-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .hero-logo-text { 
            font-size: 4rem; 
            font-weight: 900; 
            letter-spacing: -3px; 
            margin-bottom: 15px; 
            text-transform: uppercase;
            line-height: 0.9;
        }
        .hero-logo-text span { 
            color: var(--gold); 
            display: block; 
            font-size: 4.5rem;
            text-shadow: 0 0 30px var(--gold-glow);
        }

        /* PRZYCISKI */
        .btn-vertical-group { display: flex; flex-direction: column; gap: 15px; width: 100%; }

        .img-btn {
            width: 100%;
            padding: 20px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid transparent;
            font-family: inherit;
        }

        .img-btn:hover { transform: translateY(-5px) scale(1.02); }
        .btn-discord-img { background: #5865F2; color: white; }
        .btn-login-img { background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); color: white; }
        .btn-login-img:hover, .btn-login-img.active { border-color: var(--gold); color: var(--gold); background: rgba(255, 200, 0, 0.05); }

        /* DASHBOARD */
        .dash-container { display: flex; width: 100%; height: 100vh; }
        .sidebar {
            width: 300px; background: #070707;
            border-right: 1px solid var(--border-color);
            padding: 40px 20px;
            display: flex; flex-direction: column; gap: 10px;
        }

        .main-view { flex: 1; overflow-y: auto; background: rgba(0,0,0,0.6); padding: 60px; }
        .dash-content { display: none; }
        .dash-content.active { display: block; animation: sectionIn 0.4s ease; }

        .content-card {
            background: var(--dark-card);
            border: 1px solid var(--border-color);
            padding: 45px; border-radius: 30px;
            max-width: 850px;
        }
        
        .content-card h2 { font-size: 2rem; font-weight: 900; margin-bottom: 20px; color: var(--gold); }

        /* FORMULARZ BŁĘDU */
        .bug-textarea {
            width: 100%;
            height: 150px;
            background: #000;
            border: 1px solid #222;
            border-radius: 15px;
            padding: 20px;
            color: white;
            font-family: inherit;
            resize: none;
            margin-bottom: 20px;
            transition: 0.3s;
        }
        .bug-textarea:focus { border-color: var(--gold); }

        /* AUTH BOX */
        #auth-section { align-items: center; justify-content: center; }
        .auth-box { 
            background: var(--dark-card); 
            padding: 50px; 
            border-radius: 35px; 
            border: 1px solid var(--border-color); 
            width: 100%; max-width: 440px; 
            text-align: center;
        }
        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { font-size: 11px; color: var(--gold); font-weight: 800; display: block; margin-bottom: 8px; letter-spacing: 1px; }
        .input-group input { width: 100%; padding: 18px; background: #000; border: 1px solid #222; border-radius: 14px; color: white; }

        .logout-btn { color: #ff4444 !important; border-color: rgba(255,68,68,0.1) !important; margin-top: auto; }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <section id="hero-section" class="active">
        <div class="hero-card">
            <div class="hero-logo-text">PRIME <span>RP</span></div>
            <div class="btn-vertical-group">
                <a href="https://discord.gg/MecNqskCTu" target="_blank" class="img-btn btn-discord-img"><i class="fab fa-discord"></i> DISCORD</a>
                <button class="img-btn btn-login-img" id="go-to-login"><i class="fas fa-fingerprint"></i> PANEL OBYWATELA</button>
            </div>
        </div>
    </section>

    <section id="auth-section">
        <div class="auth-box">
            <h2 style="margin-bottom: 30px; font-weight: 900;">LOGOWANIE</h2>
            <div class="input-group">
                <label>IDENTYFIKATOR (NICK)</label>
                <input type="text" id="user-input" placeholder="np. Jan_Kowalski">
            </div>
            <div class="input-group">
                <label>HASŁO</label>
                <input type="password" id="pass-input" placeholder="••••••••">
            </div>
            <button class="img-btn btn-discord-img" style="width: 100%;" id="do-login">ZALOGUJ SIĘ</button>
            <button id="go-back" style="background: none; border: none; color: #444; margin-top: 20px; cursor: pointer; font-weight: 800;">POWRÓT</button>
            <div id="login-err" style="color: #ff4444; font-size: 13px; margin-top: 15px;"></div>
        </div>
    </section>

    <section id="dashboard-section">
        <div class="dash-container">
            <aside class="sidebar">
                <div class="hero-logo-text" style="font-size: 1.5rem; text-align: center; margin-bottom: 40px;">PRIME<span>RP</span></div>
                
                <button class="img-btn btn-login-img active" onclick="showTab('tab-news')"><i class="fas fa-newspaper"></i> NOWOŚCI</button>
                <button class="img-btn btn-login-img" onclick="showTab('tab-about')"><i class="fas fa-users"></i> O NAS</button>
                <button class="img-btn btn-login-img" onclick="showTab('tab-map')"><i class="fas fa-map-marked-alt"></i> MAPA</button>
                <button class="img-btn btn-login-img" onclick="showTab('tab-bug')"><i class="fas fa-bug"></i> ZGŁOŚ BŁĄD</button>
                <button class="img-btn btn-login-img" onclick="showTab('tab-rules')"><i class="fas fa-book"></i> REGULAMIN</button>
                
                <button class="img-btn logout-btn" id="do-logout"><i class="fas fa-power-off"></i> WYLOGUJ</button>
            </aside>
            
            <main class="main-view">
                <h1 id="user-display" style="margin-bottom: 40px; font-weight: 900; font-size: 2.5rem;"></h1>

                <div id="tab-news" class="dash-content active">
                    <div class="content-card">
                        <h2>Aktualności</h2>
                        <p style="color: var(--text-dim);">Witamy w nowym systemie zarządzania Sezonu 2!</p>
                    </div>
                </div>

                <div id="tab-about" class="dash-content">
                    <div class="content-card">
                        <h2>O PrimeRP</h2>
                        <p style="color: var(--text-dim);">Najlepszy RolePlay w Polsce.</p>
                    </div>
                </div>

                <div id="tab-map" class="dash-content">
                    <div class="content-card">
                        <h2>Mapa Los Santos</h2>
                        <div style="width: 100%; height: 300px; background: #000; border: 1px solid #222; border-radius: 15px;"></div>
                    </div>
                </div>

                <div id="tab-bug" class="dash-content">
                    <div class="content-card">
                        <h2>Centrum Zgłoszeń</h2>
                        <p style="color: var(--text-dim); margin-bottom: 20px;">Twój nick zostanie automatycznie dołączony do zgłoszenia.</p>
                        <textarea id="bug-text" class="bug-textarea" placeholder="Opisz dokładnie błąd, który zauważyłeś..."></textarea>
                        <button class="img-btn btn-discord-img" style="width: auto; padding: 15px 40px;" id="send-bug-btn">
                            <i class="fas fa-paper-plane"></i> WYŚLIJ ZGŁOSZENIE
                        </button>
                        <div id="bug-status" style="margin-top: 15px; font-weight: 700; font-size: 14px;"></div>
                    </div>
                </div>

                <div id="tab-rules" class="dash-content">
                    <div class="content-card">
                        <h2>Zasady</h2>
                        <p style="color: var(--text-dim);">1. RP przede wszystkim.</p>
                    </div>
                </div>
            </main>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAJoJjugpKxRm-kfWm_BaSuDzdF2YyPQZE",
            authDomain: "primerp-login.firebaseapp.com",
            projectId: "primerp-login",
            storageBucket: "primerp-login.firebasestorage.app",
            messagingSenderId: "137742617587",
            appId: "1:137742617587:web:be0b0cd85411f555f4a086"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        let currentUserNick = "Nieznany";

        const hero = document.getElementById('hero-section');
        const authSec = document.getElementById('auth-section');
        const dash = document.getElementById('dashboard-section');

        function switchSection(to) {
            [hero, authSec, dash].forEach(s => s.classList.remove('active'));
            to.classList.add('active');
        }

        window.showTab = function(tabId) {
            document.querySelectorAll('.dash-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.sidebar .img-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // --- OBSŁUGA WEBHOOKA DISCORD ---
        document.getElementById('send-bug-btn').onclick = async () => {
            const text = document.getElementById('bug-text').value.trim();
            const status = document.getElementById('bug-status');
            const webhookURL = "https://discord.com/api/webhooks/1490516856711155815/Chia9TI7kopiEG7Vnbm2l77iWIEA38lG6zcFmB-IBSl0KXlo3uBIoW6FtkmgLX3BFzzx";

            if (!text) {
                status.style.color = "#ff4444";
                status.innerText = "Nie możesz wysłać pustego zgłoszenia!";
                return;
            }

            status.style.color = "var(--gold)";
            status.innerText = "Wysyłanie...";

            const payload = {
                username: "PrimeRP System",
                embeds: [{
                    title: "🚀 Nowe Zgłoszenie Błędu",
                    color: 16762880, // Kolor złoty
                    fields: [
                        { name: "Obywatel", value: currentUserNick, inline: true },
                        { name: "Data", value: new Date().toLocaleString(), inline: true },
                        { name: "Opis Błędu", value: text }
                    ],
                    footer: { text: "WirtualnySystemRP.pl - Sezon 2" }
                }]
            };

            try {
                const response = await fetch(webhookURL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    status.style.color = "#44ff44";
                    status.innerText = "Pomyślnie wysłano zgłoszenie!";
                    document.getElementById('bug-text').value = "";
                } else {
                    throw new Error();
                }
            } catch (e) {
                status.style.color = "#ff4444";
                status.innerText = "Błąd podczas wysyłania na Discord!";
            }
        };

        // --- LOGOWANIE I AUTH ---
        document.getElementById('go-to-login').onclick = () => switchSection(authSec);
        document.getElementById('go-back').onclick = () => switchSection(hero);

        document.getElementById('do-login').onclick = async () => {
            const login = document.getElementById('user-input').value.trim();
            const pass = document.getElementById('pass-input').value;
            const err = document.getElementById('login-err');
            if(!login || !pass) return;

            const email = `${login.toLowerCase()}@primerp.pl`;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (e) {
                err.innerText = "Błąd danych!";
            }
        };

        document.getElementById('do-logout').onclick = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                switchSection(dash);
                currentUserNick = user.email.split('@')[0].toUpperCase();
                document.getElementById('user-display').innerHTML = `WITAJ, <span>${currentUserNick}</span>`;
            } else {
                switchSection(hero);
            }
        });
    </script>
</body>
</html>
