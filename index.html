<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime RP | System Logowania</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #d4af37;
            --dark-bg: #050505;
            --card-bg: rgba(15, 15, 15, 0.95);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--dark-bg);
            color: #fff;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }

        .main-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            text-align: center;
            backdrop-filter: blur(20px);
            max-width: 400px;
            width: 90%;
            transition: 0.5s;
        }

        h1 span { color: var(--gold); }

        .nav-buttons { display: grid; gap: 15px; margin-top: 20px; }

        .btn {
            padding: 14px; border-radius: 10px;
            text-decoration: none; font-weight: 700;
            text-transform: uppercase; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            cursor: pointer; border: none;
        }

        .btn-discord { background: #5865F2; color: white; }
        .btn-login { background: var(--gold); color: black; }
        .btn-login:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }

        /* Styl okna logowania */
        #login-section { display: none; margin-top: 20px; text-align: left; animation: fadeIn 0.5s; }
        input {
            width: 100%; padding: 12px; margin: 10px 0;
            background: #111; border: 1px solid #333;
            border-radius: 5px; color: white; box-sizing: border-box;
        }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="main-card" id="card">
        <div id="home-section">
            <h1>PRIME <span>RP</span></h1>
            <p>Witaj w systemie zarządzania obywatelem.</p>
            
            <div class="nav-buttons">
                <button onclick="showLogin()" class="btn btn-login">
                    <i class="fas fa-sign-in-alt"></i> Zaloguj do Systemu
                </button>
                <a href="https://discord.gg/MecNqskCTu" target="_blank" class="btn btn-discord">
                    <i class="fab fa-discord"></i> Discord
                </a>
            </div>
        </div>

        <div id="login-section">
            <h2 style="color: var(--gold)">Logowanie</h2>
            <label>Login / Obywatel ID</label>
            <input type="text" id="username" placeholder="Wpisz login...">
            <label>Hasło</label>
            <input type="password" id="password" placeholder="••••••••">
            <button onclick="attemptLogin()" class="btn btn-login" style="width: 100%; margin-top: 10px;">Wejdź do bazy</button>
            <p id="error-msg" style="color: #ff4444; font-size: 0.8rem; display: none; margin-top: 10px;">Błędne dane logowania!</p>
        </div>
    </div>

    <script>
        function showLogin() {
            document.getElementById('home-section').style.display = 'none';
            document.getElementById('login-section').style.display = 'block';
        }

        function attemptLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const error = document.getElementById('error-msg');

            // TO JEST TESTOWE LOGOWANIE (DOPÓKI NIE PODEPNIEMY BAZY)
            if(user === "admin" && pass === "prime123") {
                alert("Zalogowano pomyślnie do systemu Prime RP!");
                window.location.href = "https://discord.gg/MecNqskCTu";
            } else {
                error.style.display = 'block';
            }
        }
    </script>
</body>
</html>
